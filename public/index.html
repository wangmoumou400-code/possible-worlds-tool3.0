<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可能世界理论创意干预 - 纯净排版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #1f2d3d;
            line-height: 1.6;
            font-size: 16px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.5;
            resize: vertical;
            min-height: 140px;
            font-family: inherit;
            transition: border 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 2px rgba(74,108,247,0.1);
        }
        button {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: #4a6cf7;
            color: white;
            margin-top: 16px;
            transition: background 0.2s;
        }
        button:hover {
            background: #3b5bdb;
        }
        .result {
            margin-top: 30px;
        }
        .result-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a6cf7;
            display: inline-block;
        }
        /* 纯文本展示区 - 干净无标记 */
        .plain-text {
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px 28px;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            line-height: 1.7;
            color: #1e293b;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: inherit;
        }
        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }
        .loading, .error {
            text-align: center;
            padding: 40px 20px;
            font-size: 16px;
            border-radius: 16px;
        }
        .error {
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
        }
        .loading {
            color: #4a6cf7;
            background: #eff6ff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌀 可能世界探索</h1>
    </div>
    <div class="input-section">
        <textarea id="userInput" placeholder="请输入你的故事大纲（100-150字即可）"></textarea>
        <button id="generateBtn">🚀 启动探索</button>
    </div>
    <div id="resultArea" class="result"></div>
    <div class="footer">
        🧠 基于可能世界理论提供思考框架
    </div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const userInput = document.getElementById('userInput');
    const resultArea = document.getElementById('resultArea');

    // 简单的文本清洗：移除常见的 Markdown 标记（可选，保留可读性）
    function cleanMarkdown(text) {
        // 移除加粗/斜体标记 ** ** 和 * *，但保留其中的文字
        let cleaned = text.replace(/\*\*(.*?)\*\*/g, '$1')
                          .replace(/\*(.*?)\*/g, '$1')
                          // 移除标题标记 # ## ### 等（独立行）
                          .replace(/^#{1,6}\s+/gm, '')
                          // 移除列表标记 1. 2. 前面的数字点（但保留数字内容，仅去除格式）
                          .replace(/^\d+\.\s+/gm, '')
                          // 移除多余的换行空白
                          .replace(/\n{3,}/g, '\n\n');
        return cleaned.trim();
    }

    generateBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) {
            resultArea.innerHTML = '<div class="error">❌ 请输入故事大纲</div>';
            return;
        }

        resultArea.innerHTML = '<div class="loading">🌀 正在分析大纲，调动可能世界理论……</div>';

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userInput: text })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            let rawContent = data.html || data.content || '';
            if (!rawContent) throw new Error('返回内容为空');

            // 清除残留的星号、井号等标记，使显示纯净
            const cleanContent = cleanMarkdown(rawContent);

            // 直接以段落形式显示，保留原始换行
            resultArea.innerHTML = `
                <div class="result-header">📋 探索结果</div>
                <div class="plain-text">${escapeHtml(cleanContent)}</div>
            `;
        } catch (err) {
            console.error(err);
            resultArea.innerHTML = '<div class="error">⚠️ 生成失败，请检查网络或稍后重试</div>';
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
