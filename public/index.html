<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叙事拓扑挑战 - 可能世界理论创意干预</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #4b0082 0%, #8a2be2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container { max-width: 1100px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 25px 70px rgba(0,0,0,0.35); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4b0082 0%, #8a2be2 100%); color: white; padding: 40px 32px; text-align: center; }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .content { padding: 40px 32px; }
        textarea { width: 100%; padding: 20px; border: 2px solid #e0e0e0; border-radius: 16px; font-size: 16px; line-height: 1.6; resize: vertical; min-height: 160px; }
        textarea:focus { outline: none; border-color: #8a2be2; }
        button { padding: 16px 32px; border: none; border-radius: 50px; font-size: 18px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #4b0082 0%, #8a2be2 100%); color: white; margin-top: 20px; box-shadow: 0 8px 20px rgba(138,43,226,0.3); }
        .result { margin-top: 32px; }
        .framework-card { background: #f8f4ff; border-radius: 16px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #8a2be2; cursor: pointer; transition: all 0.2s; }
        .framework-card:hover { background: #f0e6ff; transform: translateY(-2px); }
        .framework-card.selected { background: #e6d9ff; border-left-color: #4b0082; }
        .framework-name { font-size: 15px; color: #4b0082; font-weight: 700; }
        .logic { margin: 12px 0; font-size: 15px; line-height: 1.6; }
        .cognitive { font-size: 13px; color: #555; font-style: italic; }
        .selection-info { margin: 16px 0; padding: 12px; background: #e8f4f8; border-radius: 12px; font-size: 14px; text-align: center; }
        .final-note { margin-top: 30px; padding: 20px; background: #f0e6ff; border-radius: 16px; text-align: center; font-size: 15px; line-height: 1.7; }
        .footer { padding: 24px; text-align: center; font-size: 13px; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌀 叙事拓扑挑战</h1>
        <p>基于 Ryan (1991) & Bell & Ryan (2019) 的可能世界理论 · AI创意干预工具</p>
    </div>
    <div class="content">
        <textarea id="userInput" placeholder="请输入你的故事大纲（100-150字即可）&#10"></textarea>
        <button id="generateBtn">🚀 启动拓扑挑战</button>
        <div id="resultArea" class="result"></div>
    </div>
    <div class="footer">实验用途 · 严格过程导向 · 仅提供思考框架</div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const userInput = document.getElementById('userInput');
    const resultArea = document.getElementById('resultArea');
    let currentFrameworks = [];
    let selectedSet = new Set();

    generateBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) {
            resultArea.innerHTML = '<div style="color:#d32f2f;padding:20px;background:#ffebee;border-radius:12px;">请输入故事大纲</div>';
            return;
        }

        resultArea.innerHTML = '<div style="text-align:center;padding:60px;color:#8a2be2;font-size:18px;">🔄 正在分析大纲并生成个性化拓扑挑战……</div>';

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userInput: text })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            resultArea.innerHTML = data.html;

            // 绑定点击选择
            const cards = document.querySelectorAll('.framework-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    const idx = parseInt(card.dataset.idx);
                    if (selectedSet.has(idx)) {
                        selectedSet.delete(idx);
                        card.classList.remove('selected');
                    } else {
                        selectedSet.add(idx);
                        card.classList.add('selected');
                    }
                    updateSelectedCount();
                });
            });
        } catch (err) {
            resultArea.innerHTML = '<div style="color:#d32f2f;padding:20px;background:#ffebee;border-radius:12px;">生成失败，请稍后重试</div>';
        }
    });

    function updateSelectedCount() {
        const count = document.getElementById('selectedCount');
        if (count) count.textContent = selectedSet.size;
    }
</script>
</body>
</html>
