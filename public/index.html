<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可能世界理论创意干预</title>
    <style>
        /* 全局重置：彻底消除混乱样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        
        /* 极简配色体系 */
        :root {
            --primary: #4a6cf7;
            --light-bg: #f7f8fc;
            --text-main: #333;
            --text-light: #666;
            --border: #e0e0e0;
            --card: #ffffff;
            --hover: #eef2ff;
        }

        body {
            background: #ffffff; /* 背景改为纯白，更清爽 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-main);
            line-height: 1.8; /* 优化行距，舒服阅读 */
            font-size: 16px; /* 基础字号放大 */
        }

        /* 容器：居中且限制最大宽度 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部：去掉复杂渐变，简洁大气 */
        .header {
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* 输入区域 */
        .input-section {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            min-height: 150px;
            font-family: inherit;
            transition: border 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            background: var(--primary);
            color: white;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background: #3b5bdb;
        }

        /* 结果区域：彻底简化 */
        .result {
            margin-top: 30px;
        }

        /* 结果标题 */
        .result-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        /* 框架卡片：极简重置 */
        .framework-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px; /* 确保字体统一 */
        }

        .framework-card:hover {
            background: var(--hover);
            border-color: #d0d0d0;
        }

        .framework-card.selected {
            background: #eef2ff;
            border-color: var(--primary);
        }

        /* 去掉所有强制加粗和特殊符号，原样显示 */
        .framework-name, .logic, .cognitive {
            font-size: 16px;
            color: var(--text-main);
            font-weight: normal; /* 强制不加粗 */
            font-style: normal; /* 强制不斜体 */
            margin-bottom: 8px;
        }

        /* 信息栏 */
        .selection-info {
            margin: 20px 0;
            padding: 15px;
            background: var(--light-bg);
            border-radius: 10px;
            text-align: center;
            color: var(--text-light);
            border: 1px solid var(--border);
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
        }

        .loading, .error {
            text-align: center;
            padding: 40px 20px;
            font-size: 16px;
        }

        .error { color: #e53935; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌀 可能世界探索</h1>
    </div>
    <div class="content">
        <div class="input-section">
            <textarea id="userInput" placeholder="请输入你的故事大纲（100-150字即可）"></textarea>
            <button id="generateBtn">🚀 启动探索</button>
        </div>
        <div id="resultArea" class="result"></div>
    </div>
    <div class="footer">
       仅提供思考框架
    </div>
</div>

<script>
    const generateBtn = document.getElementById('generateBtn');
    const userInput = document.getElementById('userInput');
    const resultArea = document.getElementById('resultArea');
    let selectedSet = new Set();

    generateBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) {
            resultArea.innerHTML = '<div class="error">请输入故事大纲</div>';
            return;
        }

        resultArea.innerHTML = '<div class="loading">🔄 正在分析大纲……</div>';

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userInput: text })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);

            // 核心修改：直接输出HTML，不再进行任何格式化
            resultArea.innerHTML = `
                <div class="result-header">📋 为你匹配的可能世界框架</div>
                <div class="content-wrapper">${data.html}</div>
                <div class="selection-info">已选择 <span id="selectedCount">0</span> 个框架</div>
            `;

            // 绑定选择事件
            const cards = document.querySelectorAll('.framework-card');
            cards.forEach((card, idx) => {
                card.dataset.idx = idx;
                card.addEventListener('click', () => {
                    if (selectedSet.has(idx)) {
                        selectedSet.delete(idx);
                        card.classList.remove('selected');
                    } else {
                        selectedSet.add(idx);
                        card.classList.add('selected');
                    }
                    updateSelectedCount();
                });
            });
        } catch (err) {
            resultArea.innerHTML = '<div class="error">生成失败，请稍后重试</div>';
            console.error(err);
        }
    });

    function updateSelectedCount() {
        const count = document.getElementById('selectedCount');
        if (count) count.textContent = selectedSet.size;
    }
</script>
</body>
</html>
