<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可能世界探索者 - AI创意写作助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .container { max-width: 1000px; width: 100%; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 32px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .content { padding: 32px; }
        textarea { width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; font-family: inherit; resize: vertical; }
        textarea:focus { outline: none; border-color: #667eea; }
        button { padding: 12px 24px; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-top: 16px; }
        .loading { text-align: center; padding: 40px; color: #667eea; }
        .variation-card { background: #f8f9fa; border-radius: 12px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #667eea; }
        .variation-type { font-size: 12px; color: #667eea; font-weight: 600; }
        .variation-text { font-size: 15px; margin-top: 8px; font-style: italic; }
        .info-note { margin-top: 24px; padding: 16px; background: #e8f4f8; border-radius: 12px; font-size: 13px; text-align: center; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #e0e0e0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🌍 可能世界探索者</h1>
        <p>基于可能世界理论的AI创意写作助手</p>
    </div>
    <div class="content">
        <textarea id="userInput" rows="5" placeholder="例如：&#10;他推开那扇门，发现房间里的一切都和十年前一模一样。墙上挂着的照片还在，桌上的信也没人动过。他深吸一口气，走了进去。"></textarea>
        <button id="generateBtn">✨ 探索可能世界</button>
        <div id="resultArea"></div>
        <div class="info-note">💡 AI会从「角色替换·时空置换·因果反转·模态转换·视角切换」五个角度，各生成一条“如果……”的反事实变体。</div>
    </div>
    <div class="footer">🎓 研究用途 | 基于可能世界理论设计</div>
</div>
<script>
    const generateBtn = document.getElementById('generateBtn');
    const userInput = document.getElementById('userInput');
    const resultArea = document.getElementById('resultArea');

    generateBtn.addEventListener('click', async () => {
        const text = userInput.value.trim();
        if (!text) {
            resultArea.innerHTML = '<div style="color:red;">请先输入故事片段或大纲</div>';
            return;
        }
        resultArea.innerHTML = '<div class="loading">✨ 正在探索平行宇宙...</div>';
        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userInput: text })
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            let html = '<div style="margin-top:24px;"><h3>🌟 你可能感兴趣的可能世界</h3>';
            data.variations.forEach(v => {
                html += `<div class="variation-card"><div class="variation-type">${v.type}</div><div class="variation-text">“${v.text}”</div></div>`;
            });
            html += '</div>';
            resultArea.innerHTML = html;
        } catch (err) {
            resultArea.innerHTML = '<div style="color:red;">生成失败，请稍后重试</div>';
        }
    });
</script>
</body>
</html>
